<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="800" viewBox="0 0 1280 800" font-family="Helvetica Neue, Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="desk" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1d2735"/>
      <stop offset="0.55" stop-color="#141b25"/>
      <stop offset="1" stop-color="#0e131a"/>
    </linearGradient>
    <linearGradient id="shotA" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2b3a52"/>
      <stop offset="1" stop-color="#1c2738"/>
    </linearGradient>
    <linearGradient id="shotB" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#3a2b4f"/>
      <stop offset="1" stop-color="#241a33"/>
    </linearGradient>
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="10" stdDeviation="18" flood-color="#000" flood-opacity="0.45"/>
    </filter>
  </defs>

  <!-- desktop backdrop -->
  <rect width="1280" height="800" fill="url(#desk)"/>
  <text x="40" y="64" fill="#f1f3f5" font-size="30" font-weight="700" letter-spacing="0.5">PinShot</text>
  <text x="40" y="92" fill="#8b94a1" font-size="15">Pin screenshots on top of everything — even fullscreen apps</text>

  <!-- pinned image A (sky frame + note + saved color dot) -->
  <g filter="url(#shadow)">
    <rect x="120" y="190" width="440" height="330" rx="12" fill="#10141a"/>
    <rect x="120" y="190" width="440" height="330" rx="12" fill="none" stroke="#38bdf8" stroke-width="3"/>
    <!-- header dot -->
    <circle cx="146" cy="216" r="6" fill="#38bdf8"/>
    <text x="162" y="221" fill="#aeb4bd" font-size="12">1 / 3</text>
    <!-- image area -->
    <rect x="134" y="234" width="412" height="222" rx="6" fill="url(#shotA)"/>
    <circle cx="250" cy="330" r="48" fill="#5aa9d8" opacity="0.55"/>
    <rect x="330" y="300" width="150" height="14" rx="7" fill="#7fc3e6" opacity="0.5"/>
    <rect x="330" y="330" width="110" height="14" rx="7" fill="#7fc3e6" opacity="0.35"/>
    <rect x="330" y="360" width="135" height="14" rx="7" fill="#7fc3e6" opacity="0.25"/>
    <!-- note bar -->
    <rect x="134" y="466" width="412" height="42" rx="7" fill="#0c0e13" stroke="#262a33"/>
    <text x="146" y="492" fill="#e7ebf0" font-size="14">Hero pose — keep this reference visible while tracing</text>
  </g>

  <!-- pinned image B (violet frame + note) -->
  <g filter="url(#shadow)">
    <rect x="470" y="430" width="380" height="290" rx="12" fill="#10141a"/>
    <rect x="470" y="430" width="380" height="290" rx="12" fill="none" stroke="#a78bfa" stroke-width="3"/>
    <circle cx="496" cy="456" r="6" fill="#a78bfa"/>
    <text x="512" y="461" fill="#aeb4bd" font-size="12">2 / 3</text>
    <rect x="484" y="474" width="352" height="180" rx="6" fill="url(#shotB)"/>
    <rect x="508" y="508" width="180" height="16" rx="8" fill="#b69cf0" opacity="0.5"/>
    <rect x="508" y="540" width="300" height="12" rx="6" fill="#b69cf0" opacity="0.3"/>
    <rect x="508" y="566" width="260" height="12" rx="6" fill="#b69cf0" opacity="0.25"/>
    <rect x="508" y="592" width="280" height="12" rx="6" fill="#b69cf0" opacity="0.2"/>
    <rect x="484" y="664" width="352" height="40" rx="7" fill="#0c0e13" stroke="#262a33"/>
    <text x="496" y="689" fill="#e7ebf0" font-size="14">Accent color spec: #38bdf8</text>
  </g>

  <!-- control panel -->
  <g filter="url(#shadow)">
    <rect x="952" y="150" width="276" height="372" rx="16" fill="#14161c" stroke="#2a2e36"/>
    <!-- titlebar -->
    <text x="974" y="186" fill="#f1f3f5" font-size="15" font-weight="700">PinShot</text>
    <circle cx="1186" cy="181" r="4" fill="#5b626d"/>
    <circle cx="1200" cy="181" r="4" fill="#5b626d"/>
    <circle cx="1214" cy="181" r="4" fill="#5b626d"/>
    <!-- session row -->
    <rect x="974" y="204" width="186" height="34" rx="8" fill="#1d212a" stroke="#2c313b"/>
    <text x="988" y="226" fill="#e7ebf0" font-size="13">Demo</text>
    <text x="1132" y="226" fill="#8b94a1" font-size="11">3</text>
    <rect x="1168" y="204" width="34" height="34" rx="8" fill="#1d212a" stroke="#2c313b"/>
    <text x="1180" y="227" fill="#fbbf24" font-size="15">★</text>
    <rect x="1210" y="204" width="6" height="0" />
    <!-- paste -->
    <rect x="974" y="250" width="230" height="46" rx="12" fill="#38bdf8"/>
    <text x="1089" y="279" fill="#06121a" font-size="15" font-weight="700" text-anchor="middle">Paste a new pin</text>
    <!-- hide pins -->
    <rect x="974" y="306" width="230" height="40" rx="10" fill="#a78bfa"/>
    <text x="1089" y="332" fill="#140a28" font-size="13" font-weight="700" text-anchor="middle">Hide pins</text>
    <!-- divider -->
    <rect x="974" y="360" width="230" height="1" fill="#2a2e36"/>
    <!-- mode toggle -->
    <rect x="974" y="372" width="230" height="38" rx="9" fill="#191c23" stroke="#2c313b"/>
    <rect x="978" y="376" width="111" height="30" rx="7" fill="#2b3340"/>
    <text x="1033" y="396" fill="#f1f3f5" font-size="12.5" font-weight="600" text-anchor="middle">Show all</text>
    <text x="1148" y="396" fill="#9aa2ad" font-size="12.5" text-anchor="middle">Single</text>
    <!-- count / nav -->
    <text x="1089" y="438" fill="#9aa2ad" font-size="13" text-anchor="middle">3 pins</text>
    <!-- arrange -->
    <rect x="974" y="454" width="230" height="34" rx="8" fill="none" stroke="#2c313b"/>
    <text x="1089" y="476" fill="#aeb4bd" font-size="12.5" text-anchor="middle">Arrange all</text>
    <!-- hint -->
    <text x="1089" y="506" fill="#6b7280" font-size="10.5" text-anchor="middle">⌥⌘V pin · ⌥⌘C click-through · ⌥⌘P panel</text>
  </g>
</svg>
