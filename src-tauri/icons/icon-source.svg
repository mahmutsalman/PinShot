<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#222633"/>
      <stop offset="1" stop-color="#0e1015"/>
    </linearGradient>
    <linearGradient id="ring" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#6ea8fe"/>
      <stop offset="0.55" stop-color="#5ee0c8"/>
      <stop offset="1" stop-color="#38d39f"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="10"/>
    </filter>
  </defs>

  <!-- squircle background (macOS expects baked rounding + padding) -->
  <rect x="104" y="104" width="816" height="816" rx="190" ry="190" fill="url(#bg)"/>
  <rect x="104" y="104" width="816" height="816" rx="190" ry="190"
        fill="none" stroke="#ffffff" stroke-opacity="0.06" stroke-width="2"/>

  <!-- track -->
  <circle cx="512" cy="512" r="250" fill="none"
          stroke="#ffffff" stroke-opacity="0.08" stroke-width="64"/>

  <!-- focus arc: ~82% sweep, gap at the bottom, rounded caps -->
  <g transform="rotate(125 512 512)">
    <circle cx="512" cy="512" r="250" fill="none" stroke="url(#ring)"
            stroke-width="64" stroke-linecap="round"
            stroke-dasharray="1288 283" filter="url(#soft)" opacity="0.55"/>
    <circle cx="512" cy="512" r="250" fill="none" stroke="url(#ring)"
            stroke-width="64" stroke-linecap="round"
            stroke-dasharray="1288 283"/>
  </g>

  <!-- center dot -->
  <circle cx="512" cy="512" r="34" fill="#e8eaf0"/>
</svg>
